<script>
const viewer = document.getElementById('viewer');
const pageSelect = document.getElementById('pageSelect');

function loadPage(url) {
  viewer.src = url;
  localStorage.setItem('philosophy_tts_last_page', url);
}

function openNew() {
  window.open(viewer.src, '_blank');
}

const last = localStorage.getItem('philosophy_tts_last_page');
if (last) {
  const option = Array.from(pageSelect.options).find(o => o.value === last);
  if (option) {
    pageSelect.value = last;
    viewer.src = last;
  }
}
</script>
